<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MechMind — Maintenance Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: oklch(0.14 0.006 55);
    --bg-elevated: oklch(0.18 0.01 55 / 0.6);
    --bg-card: oklch(0.2 0.012 55 / 0.5);
    --bg-card-hover: oklch(0.24 0.016 55 / 0.6);
    --border: oklch(0.32 0.015 55 / 0.5);
    --border-soft: oklch(0.3 0.014 55 / 0.35);
    --text: oklch(0.93 0.005 60);
    --text-muted: oklch(0.62 0.01 60);
    --text-faint: oklch(0.5 0.01 60);
    --accent: oklch(0.75 0.19 55);
    --accent-strong: oklch(0.8 0.19 55);
    --accent-dim: oklch(0.4 0.08 55);
    --accent-crimson: oklch(0.6 0.21 30);
    --green: oklch(0.7 0.17 145);
    --green-dim: oklch(0.25 0.05 145 / 0.35);
    --amber-status: oklch(0.75 0.17 70);
    --amber-dim: oklch(0.3 0.06 70 / 0.35);
    --red-status: oklch(0.6 0.22 25);
    --red-dim: oklch(0.3 0.08 25 / 0.35);
    --warn: oklch(0.7 0.19 45);
    --btn-label: oklch(0.15 0.01 55);
    --font-sans: "IBM Plex Sans", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, "Cascadia Mono", Consolas, "Liberation Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
  }

  body {
    position: relative;
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(900px 900px at 15% -15%, oklch(0.55 0.2 35 / 0.32), transparent 70%),
      radial-gradient(800px 800px at 100% -8%, oklch(0.5 0.2 20 / 0.26), transparent 70%),
      radial-gradient(700px 700px at 35% 115%, oklch(0.6 0.18 60 / 0.16), transparent 70%);
    filter: blur(60px);
    animation: auroraDrift 20s ease-in-out infinite;
  }

  @keyframes auroraDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(3%, -4%) scale(1.08); }
  }

  /* ---------------- Sidebar ---------------- */

  #sidebar {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-elevated);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
  }

  #sidebar h2 {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 4px 4px;
    font-weight: 600;
  }

  #sidebar .hint {
    font-size: 11px;
    color: var(--text-faint);
    margin: 0 0 16px 4px;
  }

  .unit-card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--text-faint);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }

  .unit-card:hover {
    background: var(--bg-card-hover);
  }

  .unit-card.status-green { border-left-color: var(--green); }
  .unit-card.status-amber { border-left-color: var(--amber-status); }
  .unit-card.status-red { border-left-color: var(--red-status); }

  .unit-card .row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }

  .unit-id {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }

  .unit-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.status-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.status-amber { background: var(--amber-status); box-shadow: 0 0 8px var(--amber-status); }
  .status-dot.status-red {
    background: var(--red-status);
    box-shadow: 0 0 8px var(--red-status);
    animation: pulseDot 1.6s ease-in-out infinite;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  .status-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .status-label.status-green { color: var(--green); }
  .status-label.status-amber { color: var(--amber-status); }
  .status-label.status-red { color: var(--red-status); }

  .unit-alarm {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    margin-bottom: 2px;
  }

  .unit-meta {
    font-size: 11px;
    color: var(--text-muted);
  }

  .unit-meta .sep { margin: 0 5px; color: var(--text-faint); }

  #fleet-summary {
    margin-top: auto;
    padding: 12px 14px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  #fleet-summary .count { font-weight: 700; }
  #fleet-summary .count-total { color: var(--accent-strong); }
  #fleet-summary .count-critical { color: var(--red-status); }
  #fleet-summary .count-warning { color: var(--amber-status); }

  /* ---------------- Main panel ---------------- */

  #main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 28px 36px 40px;
    background: transparent;
  }

  header.top {
    margin-bottom: 22px;
  }

  header.top h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header.top .accent-word { color: var(--accent-strong); }

  header.top p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--text-muted);
  }

  #chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }

  .chip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: border-color 0.12s ease, color 0.12s ease;
  }

  .chip:hover {
    border-color: var(--accent-dim);
    color: var(--accent-strong);
  }

  #ask-form {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  #question {
    flex: 1;
    resize: vertical;
    min-height: 52px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 12px 14px;
  }

  #question:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px oklch(0.6 0.19 55 / 0.15), 0 0 24px oklch(0.6 0.19 45 / 0.2);
  }

  #ask-btn {
    background: linear-gradient(135deg, var(--accent-strong), var(--accent-crimson));
    color: var(--btn-label);
    border: none;
    border-radius: 10px;
    padding: 0 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 20px oklch(0.65 0.2 45 / 0.5), 0 4px 12px oklch(0.1 0 0 / 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #ask-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 0 28px oklch(0.65 0.2 45 / 0.65), 0 6px 16px oklch(0.1 0 0 / 0.4);
  }

  #ask-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
    cursor: default;
    box-shadow: none;
    transform: none;
  }

  /* ---------------- History (collapsed prior Q&A) ---------------- */

  #history {
    margin-bottom: 14px;
  }

  .history-item {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }

  .history-item summary {
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    list-style: none;
  }

  .history-item summary::-webkit-details-marker { display: none; }
  .history-item summary::before { content: "\25b8  "; color: var(--text-faint); }
  .history-item[open] summary::before { content: "\25be  "; }
  .history-item summary:hover { color: var(--text); }

  .history-body {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
  }

  /* ---------------- Current result ---------------- */

  #result {
    display: none;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 24px;
  }

  #result.visible { display: block; }

  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .answer-text {
    font-size: 14.5px;
    line-height: 1.65;
    margin: 0 0 10px;
  }

  .answer-text p {
    margin: 0 0 12px;
  }

  .answer-text p:last-child {
    margin-bottom: 0;
  }

  .answer-text ul {
    margin: 0 0 12px;
    padding-left: 22px;
  }

  .answer-text li {
    margin-bottom: 4px;
  }

  .answer-text strong {
    font-weight: 700;
    color: var(--text);
  }

  /* Step cards: real rendered <ol> items from the model's answer, styled as
     highlighted steps. A single consistent accent (not a red/amber/green
     cycle) -- that palette is reserved for equipment status elsewhere, and
     using it here would misleadingly imply severity on ordinary steps. */
  .answer-text ol.step-list {
    list-style: none;
    margin: 0 0 12px;
    padding-left: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .answer-text ol.step-list > li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    background: oklch(0.75 0.19 55 / 0.08);
    border-left: 2px solid var(--accent);
    margin-bottom: 0;
  }

  .step-label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-strong);
    flex-shrink: 0;
    white-space: nowrap;
    padding-top: 1px;
  }

  .step-body {
    font-size: 13.5px;
    color: var(--text);
  }

  .trust-caption {
    font-size: 11.5px;
    color: var(--text-faint);
    margin: 0 0 14px;
  }

  .error-text {
    font-size: 14px;
    color: var(--warn);
    margin: 0;
  }

  .badges {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .badge-track {
    width: 46px;
    height: 5px;
    border-radius: 3px;
    background: oklch(0.3 0.02 55 / 0.6);
    overflow: hidden;
    flex-shrink: 0;
  }

  .badge-fill {
    height: 100%;
    border-radius: 3px;
  }

  .badge-text {
    font-family: var(--font-mono);
    text-transform: uppercase;
  }

  .badge-good {
    background: oklch(0.7 0.17 145 / 0.12);
    border: 1px solid oklch(0.7 0.17 145 / 0.4);
    color: oklch(0.75 0.17 145);
  }
  .badge-good .badge-fill { background: oklch(0.7 0.17 145); box-shadow: 0 0 6px oklch(0.7 0.17 145 / 0.8); }

  .badge-warn {
    background: oklch(0.75 0.17 70 / 0.12);
    border: 1px solid oklch(0.75 0.17 70 / 0.4);
    color: oklch(0.8 0.17 70);
  }
  .badge-warn .badge-fill { background: oklch(0.75 0.17 70); box-shadow: 0 0 6px oklch(0.75 0.17 70 / 0.8); }

  .badge-neutral {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-faint);
  }
  .badge-neutral .badge-fill { background: var(--text-faint); }

  details.sources {
    border-top: 1px solid var(--border-soft);
    padding-top: 12px;
  }

  details.sources summary {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    list-style: none;
  }

  details.sources summary::-webkit-details-marker { display: none; }
  details.sources summary:hover { color: var(--accent-strong); }

  .chevron {
    width: 7px;
    height: 7px;
    border-right: 1.5px solid var(--text-faint);
    border-bottom: 1.5px solid var(--text-faint);
    transform: rotate(-45deg);
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  details.sources[open] .chevron {
    transform: rotate(45deg);
  }

  details.sources summary:hover .chevron {
    border-color: var(--accent-strong);
  }

  .source-list {
    list-style: none;
    margin: 12px 0 0;
    padding: 0;
  }

  .source-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border-soft);
    font-size: 12.5px;
  }

  .source-item:last-child { border-bottom: none; }

  .source-file {
    font-family: var(--font-mono);
    color: var(--text);
  }

  .source-section {
    color: var(--text-muted);
    margin-left: 8px;
  }

  .source-score {
    font-family: var(--font-mono);
    color: var(--text-faint);
    flex-shrink: 0;
  }

  /* ---------------- Knowledge graph panel ---------------- */

  #kg-panel {
    position: relative;
    margin-bottom: 24px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
  }

  #kg-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(500px 400px at 15% 0%, oklch(0.55 0.2 35 / 0.2), transparent 70%),
      radial-gradient(420px 360px at 100% 100%, oklch(0.5 0.2 20 / 0.16), transparent 70%);
    filter: blur(48px);
  }

  #kg-header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 14px 18px 0;
  }

  #kg-header h2 {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0;
    font-weight: 600;
  }

  #kg-subtitle {
    font-size: 12px;
    color: var(--text-faint);
  }

  #kg-network {
    position: relative;
    z-index: 1;
    height: 460px;
    margin: 12px 18px 18px;
    border-radius: 8px;
    background: oklch(0.11 0.006 55 / 0.55);
  }

  #kg-placeholder {
    position: relative;
    z-index: 1;
    padding: 36px 18px 30px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12.5px;
  }

  /* ---------------- Recent activity feed ---------------- */

  #activity {
    margin-top: auto;
    padding-top: 18px;
    border-top: 1px solid var(--border-soft);
  }

  .activity-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  #activity h2 {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0;
    font-weight: 600;
  }

  .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(94, 158, 120, 0.5);
    animation: activity-pulse 2.2s ease-out infinite;
    flex-shrink: 0;
  }

  @keyframes activity-pulse {
    0% { box-shadow: 0 0 0 0 rgba(94, 158, 120, 0.45); }
    70% { box-shadow: 0 0 0 5px rgba(94, 158, 120, 0); }
    100% { box-shadow: 0 0 0 0 rgba(94, 158, 120, 0); }
  }

  .live-indicator {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    font-weight: 600;
  }

  .activity-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: baseline;
    font-size: 12.5px;
    color: var(--text-muted);
    padding: 5px 0;
  }

  .activity-row .eid {
    font-family: var(--font-mono);
    color: var(--text);
  }

  .activity-row .alarm {
    font-family: var(--font-mono);
  }

  .activity-row .dash {
    color: var(--text-faint);
  }
</style>
</head>
<body>

  <aside id="sidebar">
    <h2>Equipment Status</h2>
    <p class="hint">Click a unit to draft a status question</p>
    <div id="unit-list"></div>
    <div id="fleet-summary"></div>
  </aside>

  <main id="main">
    <header class="top">
      <h1>Mech<span class="accent-word">Mind</span></h1>
      <p>Ask questions about equipment manuals and maintenance history.</p>
    </header>

    <div id="chips"></div>

    <form id="ask-form">
      <textarea id="question" placeholder="Ask about an alarm code, equipment history, or installation conditions..."></textarea>
      <button id="ask-btn" type="submit">Ask</button>
    </form>

    <div id="history"></div>
    <div id="result"></div>

    <section id="kg-panel">
      <div id="kg-header">
        <h2>Knowledge Graph</h2>
        <span id="kg-subtitle"></span>
      </div>
      <p id="kg-placeholder">Click an equipment unit in the sidebar to explore its knowledge graph.</p>
      <div id="kg-network" style="display: none;"></div>
    </section>

    <section id="activity">
      <div class="activity-header">
        <h2><span class="pulse-dot"></span>Recent Activity</h2>
        <span class="live-indicator">&#9679; LIVE</span>
      </div>
      <div id="activity-list"></div>
    </section>
  </main>

<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
  const EXAMPLE_QUESTIONS = [
    "What is the recommended action for OIL_PRESS_03?",
    "Has Compressor-2 had recurring issues?",
    "Why is Pump-3 overheating?",
    "What is the capital of France?",
    "What should I check if Motor-2's vibration sensor is reporting a fault?",
  ];

  const LOADING_STEPS = [
    { text: "Searching pump_manual.md, motor_manual.md, compressor_manual.md, maintenance_logs.csv...", delay: 0 },
    { text: "Analyzing retrieved sections...", delay: 2000 },
    { text: "Generating grounded answer...", delay: 4000 },
  ];

  const questionEl = document.getElementById("question");
  const resultEl = document.getElementById("result");
  const historyEl = document.getElementById("history");
  const askForm = document.getElementById("ask-form");
  const askBtn = document.getElementById("ask-btn");
  const unitListEl = document.getElementById("unit-list");
  const fleetSummaryEl = document.getElementById("fleet-summary");
  const chipsEl = document.getElementById("chips");
  const activityListEl = document.getElementById("activity-list");
  const kgNetworkEl = document.getElementById("kg-network");
  const kgPlaceholderEl = document.getElementById("kg-placeholder");
  const kgSubtitleEl = document.getElementById("kg-subtitle");

  let loadingTimers = [];
  let history = []; // { question, html }
  let current = null; // { question, html }

  function fillQuestion(text) {
    questionEl.value = text;
    questionEl.focus();
  }

  function renderChips() {
    chipsEl.innerHTML = "";
    for (const q of EXAMPLE_QUESTIONS) {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip";
      chip.textContent = q;
      chip.addEventListener("click", () => fillQuestion(q));
      chipsEl.appendChild(chip);
    }
  }

  function statusLabel(status) {
    if (status === "green") return "OK";
    if (status === "red") return "⚠ Unresolved";
    return "⚠ Recent";
  }

  function renderUnits(units) {
    unitListEl.innerHTML = "";
    for (const u of units) {
      const card = document.createElement("div");
      card.className = `unit-card status-${u.status}`;

      const meta = u.last_alarm_code
        ? `${u.days_ago}d ago<span class="sep">&middot;</span>${u.resolved ? "Resolved" : "Unresolved"}`
        : "No log history";

      card.innerHTML = `
        <div class="row-top">
          <span class="unit-id">${u.equipment_id}</span>
          <span class="status-indicator">
            <span class="status-label status-${u.status}">${statusLabel(u.status)}</span>
            <span class="status-dot status-${u.status}"></span>
          </span>
        </div>
        <div class="unit-tag">${u.equipment_tag || ""}</div>
        ${u.last_alarm_code ? `<div class="unit-alarm">${u.last_alarm_code}</div>` : ""}
        <div class="unit-meta">${meta}</div>
      `;
      card.addEventListener("click", () => {
        fillQuestion(`What's the status of ${u.equipment_id}?`);
        loadKnowledgeGraph(u.equipment_id);
      });
      unitListEl.appendChild(card);
    }
  }

  function renderFleetSummary(units) {
    const total = units.length;
    const critical = units.filter((u) => u.status === "red").length;
    const warning = units.filter((u) => u.status === "amber").length;
    fleetSummaryEl.innerHTML = `
      <span class="count count-total">${total}</span> units monitored &middot;
      <span class="count count-critical">${critical}</span> critical &middot;
      <span class="count count-warning">${warning}</span> warning
    `;
  }

  async function loadEquipmentStatus() {
    try {
      const res = await fetch("/equipment/status");
      if (!res.ok) throw new Error(`status ${res.status}`);
      const data = await res.json();
      renderUnits(data.units);
      renderFleetSummary(data.units);
    } catch (err) {
      unitListEl.innerHTML = `<p class="error-text" style="font-size:12px;">Couldn't load equipment status.</p>`;
      console.error("equipment status load failed", err);
    }
  }

  function renderActivity(entries) {
    if (!entries.length) {
      activityListEl.innerHTML = `<p style="font-size:12.5px;color:var(--text-faint);">No recent activity.</p>`;
      return;
    }
    activityListEl.innerHTML = entries
      .map((e) => {
        const resolvedText = e.resolved === null || e.resolved === undefined
          ? "Unknown"
          : e.resolved ? "Resolved" : "Unresolved";
        return `
          <div class="activity-row">
            <span class="eid">${escapeHtml(e.equipment_id)}</span>
            <span class="dash">&mdash;</span>
            <span class="alarm">${escapeHtml(e.alarm_code || "?")}</span>
            <span class="dash">&mdash;</span>
            <span>${e.days_ago}d ago</span>
            <span class="dash">&mdash;</span>
            <span>${resolvedText}</span>
          </div>
        `;
      })
      .join("");
  }

  async function loadRecentActivity() {
    try {
      const res = await fetch("/equipment/recent-activity");
      if (!res.ok) throw new Error(`status ${res.status}`);
      const data = await res.json();
      renderActivity(data.entries);
    } catch (err) {
      activityListEl.innerHTML = `<p class="error-text" style="font-size:12px;">Couldn't load recent activity.</p>`;
      console.error("recent activity load failed", err);
    }
  }

  function scoreBadge(label, score) {
    const labelUpper = label.toUpperCase();
    if (score === null || score === undefined) {
      return `<span class="badge badge-neutral"><span class="badge-track"><span class="badge-fill" style="width:0%"></span></span><span class="badge-text">${labelUpper} N/A</span></span>`;
    }
    const pct = Math.round(score * 100);
    const cls = score >= 0.7 ? "badge-good" : "badge-warn";
    return `<span class="badge ${cls}"><span class="badge-track"><span class="badge-fill" style="width:${pct}%"></span></span><span class="badge-text">${labelUpper} ${pct}%</span></span>`;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // Lightweight, regex-based markdown -> HTML for LLM answer text. Escapes
  // HTML first so nothing in the source can inject tags, then handles just
  // enough markdown for how the model formats answers: **bold**, numbered/
  // bulleted lists, and paragraph/line breaks. Inline formatting is applied
  // per-line (before assembling paragraphs/lists) so a "**" pair can't
  // accidentally span across list items or paragraphs.
  function applyInlineMarkdown(line) {
    return line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  }

  function renderMarkdown(raw) {
    const lines = escapeHtml(raw).split("\n");
    const blocks = [];
    let paragraphLines = [];
    let currentList = null; // { tag: "ul" | "ol", items: [] }
    // A numbered list is often interrupted by a blank line or an indented
    // bullet sub-list (e.g. "1. Step\n- detail\n- detail\n2. Step"). Since
    // this parser has no notion of nesting, that interruption would
    // otherwise force a brand-new <ol> and restart the visible numbering at
    // 1. Tracking a running count and rendering each <ol> with a `start`
    // attribute keeps the numbers continuous across such interruptions --
    // only a real prose paragraph resets it, since that's a genuine break.
    let orderedCount = 0;

    function flushParagraph() {
      if (paragraphLines.length) {
        blocks.push(`<p>${paragraphLines.join("<br>")}</p>`);
        paragraphLines = [];
      }
    }

    function flushList() {
      if (!currentList) return;
      if (currentList.tag === "ol") {
        const items = currentList.items
          .map((item, idx) => `<li><span class="step-label">STEP ${orderedCount + idx + 1}</span><span class="step-body">${item}</span></li>`)
          .join("");
        blocks.push(`<ol class="step-list">${items}</ol>`);
        orderedCount += currentList.items.length;
      } else {
        const items = currentList.items.map((item) => `<li>${item}</li>`).join("");
        blocks.push(`<ul>${items}</ul>`);
      }
      currentList = null;
    }

    for (const rawLine of lines) {
      const line = rawLine.trim();
      if (line === "") {
        flushParagraph();
        continue;
      }

      const numbered = line.match(/^\d+\.\s+(.*)$/);
      const bulleted = line.match(/^[-*]\s+(.*)$/);

      if (numbered) {
        flushParagraph();
        if (!currentList || currentList.tag !== "ol") {
          flushList();
          currentList = { tag: "ol", items: [] };
        }
        currentList.items.push(applyInlineMarkdown(numbered[1]));
      } else if (bulleted) {
        flushParagraph();
        if (!currentList || currentList.tag !== "ul") {
          flushList();
          currentList = { tag: "ul", items: [] };
        }
        currentList.items.push(applyInlineMarkdown(bulleted[1]));
      } else {
        flushList();
        orderedCount = 0;
        paragraphLines.push(applyInlineMarkdown(line));
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  function trustCaption(data) {
    const parts = [`Answered in ${(data.latency_ms / 1000).toFixed(1)}s`];
    parts.push(`${data.retrieved_chunk_count} source${data.retrieved_chunk_count === 1 ? "" : "s"} retrieved`);
    if (data.model) parts.push(data.model);
    return parts.join(" &middot; ");
  }

  function answerHtml(data) {
    const badges = `
      <div class="badges">
        ${scoreBadge("Grounded", data.groundedness)}
        ${scoreBadge("Relevant", data.relevance)}
      </div>
    `;

    const sourceItems = (data.sources || [])
      .map((s) => {
        let detail = "";
        if (s.section_title) {
          detail = s.section_title;
        } else if (s.log_id) {
          detail = s.alarm_code ? `${s.log_id} (${s.alarm_code})` : s.log_id;
        }
        return `
        <li class="source-item">
          <span><span class="source-file">${escapeHtml(s.source_file)}</span>${
            detail ? `<span class="source-section">${escapeHtml(detail)}</span>` : ""
          }</span>
          <span class="source-score">${s.score.toFixed(3)}</span>
        </li>`;
      })
      .join("");

    const sourceCount = data.retrieved_chunk_count;
    const sources = `
      <details class="sources">
        <summary><span class="chevron"></span>${sourceCount} SOURCE${sourceCount === 1 ? "" : "S"} REFERENCED</summary>
        <ul class="source-list">${sourceItems || "<li class=\"source-item\">No sources retrieved.</li>"}</ul>
      </details>
    `;

    return `
      <div class="answer-text">${renderMarkdown(data.answer)}</div>
      <p class="trust-caption">${trustCaption(data)}</p>
      ${badges}
      ${sources}
    `;
  }

  function renderHistory() {
    historyEl.innerHTML = history
      .map(
        (item) => `
        <details class="history-item">
          <summary>${escapeHtml(item.question)}</summary>
          <div class="history-body">${item.html}</div>
        </details>
      `
      )
      .join("");
  }

  function archiveCurrentIfAny() {
    if (current) {
      history.push(current);
      current = null;
      renderHistory();
    }
  }

  function clearLoadingTimers() {
    loadingTimers.forEach(clearTimeout);
    loadingTimers = [];
  }

  function startLoadingSequence() {
    clearLoadingTimers();
    resultEl.classList.add("visible");
    resultEl.innerHTML = `<div class="loading"><span class="spinner"></span><span id="loading-text">${LOADING_STEPS[0].text}</span></div>`;
    const textEl = document.getElementById("loading-text");
    for (const step of LOADING_STEPS.slice(1)) {
      const timer = setTimeout(() => {
        if (document.getElementById("loading-text")) {
          document.getElementById("loading-text").textContent = step.text;
        }
      }, step.delay);
      loadingTimers.push(timer);
    }
  }

  function renderAnswer(question, data) {
    clearLoadingTimers();
    resultEl.innerHTML = answerHtml(data);
    current = { question, html: resultEl.innerHTML };
  }

  function renderError(message) {
    clearLoadingTimers();
    resultEl.classList.add("visible");
    resultEl.innerHTML = `<p class="error-text">${escapeHtml(message)}</p>`;
    current = null;
  }

  askForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = questionEl.value.trim();
    if (!question) return;

    archiveCurrentIfAny();

    askBtn.disabled = true;
    startLoadingSequence();

    try {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || `Request failed (${res.status})`);
      }
      renderAnswer(question, data);
    } catch (err) {
      renderError(err.message || "Something went wrong.");
    } finally {
      askBtn.disabled = false;
    }
  });

  renderChips();
  loadEquipmentStatus();
  loadRecentActivity();

  // ---------------- Knowledge graph panel ----------------

  const KG_TYPE_COLOR = {
    Equipment: "#e8a838",
    Document: "#5b6c7d",
    LogEntry: "#4a4a4a",
  };

  const KG_TYPE_SIZE = {
    Equipment: 24,
    Document: 13,
    LogEntry: 7,
    AlarmCode: 16,
  };

  // Higher mass on the labeled types (Equipment, AlarmCode) increases the
  // repulsive force they exert on their neighbors in forceAtlas2Based, so
  // they push each other further apart -- spreading out the always-visible
  // labels that would otherwise crowd together. Document/LogEntry stay at
  // the default so they don't get shoved out of a tight, readable cluster.
  const KG_TYPE_MASS = {
    Equipment: 3,
    AlarmCode: 2,
    Document: 1,
    LogEntry: 1,
  };


  const KG_NETWORK_OPTIONS = {
    autoResize: true,
    nodes: {
      shape: "dot",
      borderWidth: 1,
      borderWidthSelected: 2,
      font: { face: "IBM Plex Sans", color: "#cfd0d3", size: 12 },
      scaling: { min: 6, max: 30 },
    },
    edges: {
      color: { color: "rgba(255,255,255,0.15)" },
      width: 1,
      smooth: { type: "continuous" },
      arrows: { to: { enabled: true, scaleFactor: 0.4 } },
    },
    physics: {
      solver: "forceAtlas2Based",
      forceAtlas2Based: {
        gravitationalConstant: -85,
        centralGravity: 0.012,
        springLength: 120,
        springConstant: 0.16,
        damping: 0.5,
        avoidOverlap: 1,
      },
      stabilization: { enabled: true, iterations: 220, fit: true },
      timestep: 0.4,
      minVelocity: 0.75,
    },
    interaction: {
      hover: true,
      tooltipDelay: 100,
    },
  };

  let kgNetwork = null;
  let kgNodesDataSet = null;
  let kgEdgesDataSet = null;
  let kgPinnedNode = null;

  function kgAlarmColor(severity) {
    const s = (severity || "").toLowerCase();
    return s === "critical" || s === "safety" ? "#e5484d" : "#d99a3d";
  }

  function kgNodeColor(node) {
    if (node.type === "AlarmCode") return kgAlarmColor(node.severity);
    return KG_TYPE_COLOR[node.type] || "#888888";
  }

  function kgAlwaysLabeled(type) {
    return type === "Equipment" || type === "AlarmCode";
  }

  function kgResetHighlight() {
    if (!kgNodesDataSet || !kgEdgesDataSet) return;
    kgNodesDataSet.forEach((n) => {
      kgNodesDataSet.update({
        id: n.id,
        opacity: 1,
        label: kgAlwaysLabeled(n.kgType) ? n.kgLabel : "",
      });
    });
    kgEdgesDataSet.forEach((e) => {
      kgEdgesDataSet.update({ id: e.id, color: { color: "rgba(255,255,255,0.15)" } });
    });
  }

  function kgApplyHighlight(nodeId) {
    if (!kgNetwork) return;
    const connected = new Set(kgNetwork.getConnectedNodes(nodeId));
    connected.add(nodeId);
    const connectedEdges = new Set(kgNetwork.getConnectedEdges(nodeId));

    kgNodesDataSet.forEach((n) => {
      const active = connected.has(n.id);
      kgNodesDataSet.update({
        id: n.id,
        opacity: active ? 1 : 0.15,
        label: active || kgAlwaysLabeled(n.kgType) ? n.kgLabel : "",
      });
    });
    kgEdgesDataSet.forEach((e) => {
      const active = connectedEdges.has(e.id);
      kgEdgesDataSet.update({
        id: e.id,
        color: { color: active ? "rgba(255,255,255,0.75)" : "rgba(255,255,255,0.04)" },
      });
    });
  }

  function renderKnowledgeGraph(equipmentId, data) {
    kgPinnedNode = null;
    kgPlaceholderEl.style.display = "none";
    kgNetworkEl.style.display = "block";
    kgSubtitleEl.textContent = `${data.nodes.length} nodes · ${equipmentId}`;

    const visNodes = data.nodes.map((n) => ({
      id: n.id,
      kgType: n.type,
      kgLabel: n.label,
      label: kgAlwaysLabeled(n.type) ? n.label : "",
      shape: "dot",
      size: KG_TYPE_SIZE[n.type] || 10,
      mass: KG_TYPE_MASS[n.type] || 1,
      color: { background: kgNodeColor(n), border: kgNodeColor(n) },
      opacity: 1,
      title: `${n.type}: ${n.label}${n.severity ? ` (${n.severity})` : ""}`,
    }));

    const visEdges = data.edges.map((e, idx) => ({
      id: `${e.source}->${e.target}:${e.type}:${idx}`,
      from: e.source,
      to: e.target,
      title: e.type,
    }));

    if (kgNetwork) {
      kgNetwork.destroy();
      kgNetwork = null;
    }

    kgNodesDataSet = new vis.DataSet(visNodes);
    kgEdgesDataSet = new vis.DataSet(visEdges);

    kgNetwork = new vis.Network(
      kgNetworkEl,
      { nodes: kgNodesDataSet, edges: kgEdgesDataSet },
      KG_NETWORK_OPTIONS
    );

    kgNetwork.once("stabilizationIterationsDone", () => {
      kgNetwork.setOptions({ physics: false });
      // fit() sizes to the node centers, so outermost labels can land right
      // at (or past) the canvas edge. Zoom out 10% from there as a margin.
      kgNetwork.moveTo({
        position: kgNetwork.getViewPosition(),
        scale: kgNetwork.getScale() * 0.9,
        animation: false,
      });
    });

    kgNetwork.on("hoverNode", (params) => {
      if (kgPinnedNode) return;
      kgApplyHighlight(params.node);
    });
    kgNetwork.on("blurNode", () => {
      if (kgPinnedNode) return;
      kgResetHighlight();
    });
    kgNetwork.on("click", (params) => {
      if (params.nodes.length) {
        kgPinnedNode = params.nodes[0];
        kgApplyHighlight(kgPinnedNode);
      } else {
        kgPinnedNode = null;
        kgResetHighlight();
      }
    });
  }

  async function loadKnowledgeGraph(equipmentId) {
    kgPlaceholderEl.style.display = "block";
    kgPlaceholderEl.textContent = `Loading knowledge graph for ${equipmentId}...`;
    kgNetworkEl.style.display = "none";
    kgSubtitleEl.textContent = "";
    try {
      const res = await fetch(`/knowledge-graph?equipment=${encodeURIComponent(equipmentId)}`);
      if (!res.ok) throw new Error(`status ${res.status}`);
      const data = await res.json();
      renderKnowledgeGraph(equipmentId, data);
    } catch (err) {
      kgPlaceholderEl.style.display = "block";
      kgPlaceholderEl.textContent = `Couldn't load the knowledge graph for ${equipmentId}.`;
      kgNetworkEl.style.display = "none";
      console.error("knowledge graph load failed", err);
    }
  }
</script>
</body>
</html>

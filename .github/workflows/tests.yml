name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Matches the Dockerfile's python:3.13-slim base image.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # No API keys/secrets are configured here on purpose: every test mocks
      # out the network boundary (Qdrant, OpenAI, LangFuse) rather than
      # calling it for real -- see test_ask_endpoint.py's module docstring.
      # app/config.py's Settings fields are all optional with defaults, so
      # the app imports and the suite runs cleanly with zero env vars/.env
      # file present (verified locally with .env removed and the relevant
      # env vars unset before adding this workflow).
      - name: Run tests
        run: pytest -q
